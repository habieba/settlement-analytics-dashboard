services:
  - type: web
    name: settlement-analytics-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python seed_data.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///settlement.db
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
